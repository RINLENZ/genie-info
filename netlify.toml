# Déploiement du front Next.js sur Netlify (monorepo).
#
# À configurer dans l'UI Netlify (Site settings → Environment variables) :
#   NEXT_PUBLIC_API_URL = https://<votre-api>.onrender.com   (API FastAPI sur Render)

[build]
  base = "apps/web"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Déclaration explicite du plugin Next.js (évite le 404 si l'auto-détection
# échoue en monorepo : c'est lui qui sert les pages au lieu du dossier source).
[[plugins]]
  package = "@netlify/plugin-nextjs"
