# Blueprint Render — API FastAPI + PostgreSQL managé.
# Déploiement : Render → New → Blueprint → connecter le repo (détecte ce fichier).
# Le schéma + le seed sont appliqués au 1er démarrage (RUN_MIGRATIONS, cf. entrypoint.sh).

databases:
  - name: genie-info-db
    databaseName: genie_info
    user: genie_info
    plan: free

services:
  - type: web
    name: genie-info-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: genie-info-db
          property: connectionString
      - key: RUN_MIGRATIONS
        value: "true"
      # Mettre l'URL exacte du site Netlify une fois connue (évite CORS "*").
      - key: CORS_ORIGINS
        value: "*"
      # Secret JWT généré automatiquement par Render.
      - key: JWT_SECRET
        generateValue: true
      # Compte admin : email en clair, mot de passe à saisir dans le dashboard.
      - key: ADMIN_EMAIL
        value: depginfo@enset-ebolowa.cm
      - key: ADMIN_PASSWORD
        sync: false
